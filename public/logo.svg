<svg xmlns="http://www.w3.org/2000/svg" width="480" height="160" viewBox="0 0 480 160">
  <defs>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Sparkle mark — 4-pointed star with curved concave sides -->
  <g transform="translate(72, 80)">
    <!-- Main sparkle -->
    <path d="M 0,-58 Q 18,18 58,0 Q 18,18 0,58 Q -18,18 -58,0 Q -18,-18 0,-58 Z"
          fill="url(#sparkGrad)"/>
    <!-- Accent dot top-right -->
    <circle cx="46" cy="-42" r="7" fill="#f59e0b"/>
    <!-- Small dot -->
    <circle cx="62" cy="-22" r="4" fill="#f59e0b" opacity="0.7"/>
    <!-- Tiny dot -->
    <circle cx="30" cy="-62" r="3" fill="#38bdf8" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="156" y="65"
        font-family="Inter, 'Helvetica Neue', sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#0c1a2e">Super</text>
  <text x="156" y="105"
        font-family="Inter, 'Helvetica Neue', sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#0284c7">Sparkles</text>
  <!-- Tagline -->
  <text x="158" y="127"
        font-family="Inter, 'Helvetica Neue', sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="3.5"
        fill="#64748b">PROFESSIONAL CLEANING</text>
</svg>
